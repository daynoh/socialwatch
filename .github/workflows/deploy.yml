name: Deploy SocialWatch

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: socialwatch-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@56.3.1

      - name: Refresh Vercel access token
        env:
          VERCEL_REFRESH_TOKEN: ${{ secrets.VERCEL_REFRESH_TOKEN }}
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync } from 'node:fs'

          const discoveryResponse = await fetch('https://vercel.com/.well-known/openid-configuration')
          if (!discoveryResponse.ok) {
            throw new Error(`Unable to load Vercel OAuth configuration: ${discoveryResponse.status}`)
          }

          const discovery = await discoveryResponse.json()
          const tokenResponse = await fetch(discovery.token_endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
              client_id: 'cl_HYyOPBNtFMfHhaUn9L4QPfTZz6TP47bp',
              grant_type: 'refresh_token',
              refresh_token: process.env.VERCEL_REFRESH_TOKEN,
            }),
          })

          const tokens = await tokenResponse.json()
          if (!tokenResponse.ok || !tokens.access_token) {
            throw new Error(`Unable to refresh Vercel access: ${tokens.error ?? tokenResponse.status}`)
          }

          console.log(`::add-mask::${tokens.access_token}`)
          appendFileSync(process.env.GITHUB_ENV, `VERCEL_TOKEN=${tokens.access_token}\n`)
          NODE

      - name: Pull Vercel configuration
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build production output
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy production output
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
